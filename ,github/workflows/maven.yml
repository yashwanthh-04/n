name: Java CI/CD Pipeline
on:
 push:
 branches: [ "main" ]
jobs:
 build:
 runs-on: windows-latest
 env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 steps:
 - uses: actions/checkout@v4
 - uses: actions/setup-java@v4
 with:
 distribution: 'temurin'
 java-version: '11'
 - name: Build using Maven
 run: mvn clean install
 working-directory: demo

To understand Docker and containers, it helps to start with a real-world analogy: the shipping industry.

Before standardized steel shipping containers were invented, loading goods onto a ship was a nightmare. Sacks of coffee, boxes of electronics, and barrels of oil all had to be packed differently. Then came the standard shipping container. Suddenly, it didn't matter what was inside—the container could be easily loaded onto any ship, train, or truck in the world.

Software containers and Docker do the exact same thing, but for software applications.

What is a Container?
A container is a standardized, lightweight unit of software. It packages up your application's code together with everything it needs to run properly: libraries, system tools, code runtimes, and settings.

Why are containers useful?

Consistency: Have you ever heard a developer say, "It works on my machine!" but then it crashes when sent to a tester or put on the live server? Containers solve this. Because the container holds all the dependencies, the app will run exactly the same way on a developer's laptop, a testing environment, or the cloud.

Portability: Just like a shipping container fits on any truck, a software container can run on almost any computer or operating system (Windows, Mac, or Linux).

Efficiency: Unlike traditional Virtual Machines (VMs) that require booting up an entire, separate operating system for each application, containers share the host computer's operating system. This makes them incredibly fast to start and very light on memory and CPU.

What is Docker?
If a container is the steel shipping box, Docker is the shipping company, the cranes, and the port infrastructure that makes using the boxes incredibly easy.

Docker is the most popular software platform used to create, manage, and deploy these containers.

What Docker provides:

Docker Engine: The core program installed on your computer that actually runs the containers.

Dockerfile: A simple text file of instructions (a recipe) that tells Docker how to build your specific container.

Docker Hub: An online registry (like an app store) where people can share pre-made containers. You can download a ready-to-use container with a database like MySQL or a web server like Nginx in seconds.

In Summary
The Container is the isolated package holding your app and its necessities.

Docker is the toolset you use to build, share, and run those packages.

